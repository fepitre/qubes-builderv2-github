include:
  - file: /common.yml
    project: QubesOS/qubes-continuous-integration

stages:
  - prepare
  - test

variables:
  DEBUG: "1"

lint:
  extends: .lint
  stage: test
  rules:
    - if: $CI_COMMIT_REF_NAME == "test"
      when: always
    - when: manual
  variables:
    DIR: $PWD

mypy:
  stage: test
  rules:
    - if: $CI_COMMIT_REF_NAME == "test"
      when: always
    - when: manual
  image: fedora:latest
  tags:
    - vm
  before_script:
    - sudo dnf install -y python3-mypy python3-pip python3-pathspec git
    - sudo python3 -m pip install types-PyYAML types-python-dateutil
    - echo "Qubes Builder v2 branch '${CI_QUBES_BUILDER_BRANCH:-main}'"
    - git clone -b "${CI_QUBES_BUILDER_BRANCH:-main}" https://gitlab.com/QubesOS/qubes-builderv2.git
  script:
    - PYTHONPATH="$PWD/qubes-builderv2" MYPYPATH="$PWD/qubes-builderv2" mypy --install-types --non-interactive --junit-xml mypy.xml
  artifacts:
    reports:
      junit: mypy.xml

.pytest:
  stage: test
  rules:
    - if: $CI_COMMIT_REF_NAME == "test"
      when: always
    - when: manual
  tags:
    - qubes
    - vm
  variables:
    PYTEST_ARGS: >-
      -vvv --showlocals --color=yes
      --tb=long
      --capture=no
      -rA
      -o truncation_limit_chars=0
      -o truncation_limit_lines=0
      -o junit_logging=all
      --junitxml=results/junit.xml
  artifacts:
    when: always
    paths:
      - results/
    reports:
      junit: results/junit.xml
  before_script:
    - sudo dnf install -y python3-pathspec python3-pytest sequoia-sq sequoia-sqv sequoia-chameleon-gnupg python3-github python3-psutil python3-pytest-asyncio
    - mkdir -p "$CI_PROJECT_DIR/results"
  script:
    - TMPDIR=~ pytest-3 $PYTEST_ARGS $PYTEST_TARGETS
  after_script:
    - mkdir -p "$CI_PROJECT_DIR/results"
    - cp -r ~/pytest-of-$USER/pytest-current/github-current/*.log "$CI_PROJECT_DIR/results"/ 2>/dev/null || true
    - cp -r ~/pytest-of-$USER/pytest-current/github-current/builder-github-logs "$CI_PROJECT_DIR/results"/ 2>/dev/null || true

test-common:
  extends: .pytest
  variables:
    PYTEST_TARGETS: "tests/test_common.py"

test-action-component:
  extends: .pytest
  variables:
    PYTEST_TARGETS: "tests/test_action.py -k test_action_component"

test-action-template:
  extends: .pytest
  variables:
    PYTEST_TARGETS: "tests/test_action.py -k test_action_template"

test-action-iso:
  extends: .pytest
  variables:
    PYTEST_TARGETS: "tests/test_action.py -k test_action_iso"

test-action-logging:
  extends: .pytest
  variables:
    PYTEST_TARGETS: "tests/test_action_bis.py -k test_action_"

test-rpc-parse:
  extends: .pytest
  variables:
    PYTEST_TARGETS: "tests/test_rpc.py -k _parse_"

test-rpc-component:
  extends: .pytest
  variables:
    PYTEST_TARGETS: "tests/test_rpc.py -k test_rpc_04"

test-rpc-template:
  extends: .pytest
  variables:
    PYTEST_TARGETS: "tests/test_rpc.py -k test_rpc_05"

test-rpc-iso:
  extends: .pytest
  variables:
    PYTEST_TARGETS: "tests/test_rpc.py -k test_rpc_06"

test-command:
  extends: .pytest
  variables:
    PYTEST_TARGETS: "tests/test_command.py"

test-notify:
  extends: .pytest
  variables:
    PYTEST_TARGETS: "tests/test_notify.py"